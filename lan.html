<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Test API</title>
  </head>
  <body style="background-color: black; color: aliceblue;">
    <p src="">test api</p>
    <img src="" alt="avatar-img" id="avatar" style="display: none;">
    <img src="" alt="decoration" id="decoration" class="avatar-decoration">
    <p id="name"></p>
    <p id="act"></p>
     

    <script>async function fetchdata() {
  try {
    const response = await fetch(
      "https://api.lanyard.rest/v1/users/792370349652049960"
    );
    if (!response.ok)
      throw new Error("HTTP error: " + response.status);

    const json = await response.json();
    const userData = json.data;

    if (!userData.discord_user) {
      console.error("No discord_user in response:", userData);
      return;
    }

    const avatarHash   = userData.discord_user.avatar;
    const userId       = userData.discord_user.id;
    const avatarFormat = avatarHash?.startsWith("a_") ? "gif" : "webp";
    const avatarUrl    = `https://cdn.discordapp.com/avatars/${userId}/${avatarHash}.${avatarFormat}?size=240`;

    const avatarImg = document.getElementById("avatar");
    avatarImg.src   = avatarUrl;
    avatarImg.style.display = "block";

    // decoration
     const  decorationData  = userData.discord_user.avatar_decoration_data;
    const decAsset    = decorationData.asset;   
    const decFormat = decAsset?.startsWith("a_") ? "webp" : "webp";
    const decorationUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${decAsset}.${decFormat}?size=240`;

    const decorationEl = document.getElementById("decoration");
    decorationEl.src   = decorationUrl;
    decorationEl.style.display = "block";
     const username = userData.discord_user.global_name;
     document.getElementById("name").textContent = `@${username}`;

    const presence = json.data;

// ... your avatar + status‑dot code ...

const activities = userData.activities || [];
const activityEl = document.getElementById("act");

if (activities.length === 0) {
  activityEl.textContent = "No activity";
} else {
  const activity = activities[0];

  if (activity.name === "Listening to Spotify" && presence.spotify) {
    const { track_name, artist } = presence.spotify;
    activityEl.textContent = ` Listening to: ${track_name} – ${artist}`;
  } else {
    const name = activity.name || "Unknown";
    const details = activity.details || "";
    const state = activity.state || "";

    if (details && state) {
      activityEl.textContent = `${name}: ${details} – ${state}`;
    } else if (details) {
      activityEl.textContent = `${name}: ${details}`;
    } else if (state) {
      activityEl.textContent = `${name}: ${state}`;
    } else {
      activityEl.textContent = `Playing ${name}`;
    }
  }
}



  } catch (error) {
    console.error("Fetch failed:", error);
  }
}


fetchdata();
    </script>
  </body>
</html>
