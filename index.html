            <script>
            async function fetchdata() {
            try {
              const response = await fetch("https://api.lanyard.rest/v1/users/792370349652049960");
              if (!response.ok) throw new Error("HTTP error: " + response.status);

              const json = await response.json();
              console.log("Lanyard response:", json);
              const userData = json.data;

              if (!userData.discord_user) {
                console.error("No discord_user in response:", userData);
                return;
              }
                  const activities = userData.spotify;
              const artist = activities ? activities.artist : null;
              const song   = activities ? activities.song : null;
              const actEle = document.getElementById("act");
              if (artist && song) {
                actEle.textContent = `${song} - ${artist}`;
              } else {
                actEle.textContent = "No Activity";
              }
              

              const avatarHash   = userData.discord_user.avatar;
              const userId       = userData.discord_user.id;
              const avatarFormat = avatarHash?.startsWith("a_") ? "gif" : "webp";
              const avatarUrl    = `https://cdn.discordapp.com/avatars/${userId}/${avatarHash}.${avatarFormat}?size=240`;

              const imgEle = document.getElementById("avatar");
              imgEle.src   = avatarUrl;
              imgEle.style.display = "block";

              const  decorationData  = userData.discord_user.avatar_decoration_data;
              const decAsset    = decorationData.asset;   
              const decFormat = decAsset?.startsWith("a_") ? "webp" : "webp";
              const decorationUrl = `https://cdn.discordapp.com/avatar-decoration-presets/${decAsset}.${decFormat}?size=240`;

              const decorationEl = document.getElementById("decoration");
              decorationEl.src   = decorationUrl;
              decorationEl.style.display = "block";

              const username = userData.discord_user.global_name;
              document.getElementById("name").textContent = `@${username}`;

               const status    = userData.discord_status;
               const statusDot = document.getElementById("dot");


               statusDot.className = "dot";

              if (status === "online")   statusDot.classList.add("online");
              else if (status === "idle")    statusDot.classList.add("idle");
              else if (status === "dnd")     statusDot.classList.add("dnd");
              else                         statusDot.classList.add("offline");
                  
            } catch (error) {
              console.error("Fetch failed:", error);
            }
          }

          fetchdata();
            </script>

               Your browser does not support the audio element.

             <input class="bar" type="range" value="0" id="progress"> 
             <div class="controls">
                <div ><i onclick="previous()" class="fa-solid fa-backward" style="color: rgb(255, 255, 255);"></i> </div>
                <div onclick="playPause()"><i class="fa-solid fa-play" style="color: rgb(255, 255, 255);" width="20px" height="20px" id="ctrlicon"></i></div>
                <div><i onclick="next()" class="fa-solid fa-forward" style="color: rgb(255, 255, 255);"></i></div>
             </div>

             <script>
            let progress = document.getElementById("progress");
            let song = document.getElementById("song");
            let ctrlicon = document.getElementById("ctrlicon");
            let nextbtn = document.querySelector(".fa-forward");
            let prevbtn = document.querySelector(".fa-backward");
            let songImg = document.getElementById("s-img");
            let songTitle = document.getElementById("song-title");

            song.onloadedmetadata = function(){
                progress.max=song.duration;
                progress.value=song.currentTime;
            
            }

            function playPause(){
                if(ctrlicon.classList.contains("fa-pause")) {
                    song.pause();
                    ctrlicon.classList.remove("fa-pause");
                    ctrlicon.classList.add("fa-play");  
                }
                else{
                    song.play();
                    ctrlicon.classList.add("fa-pause");
                    ctrlicon.classList.remove("fa-play");

                }

            }

            if(song.play()){
                setInterval(()=>{
                    progress.value = song.currentTime;
                },500);
            }
            progress.onchange = function(){
                song.play();
                song.currentTime = progress.value;
                ctrlicon.classList.add("fa-pause");
                ctrlicon.classList.remove("fa-play");

            }

            function next(){
              if(nextbtn.classList.contains("fa-forward")){
                song.src = "[028] Milet ~ Anytime Anywhere _ Lyrics RomEng [(Onion Subs)].m4a";
                song.play();
                ctrlicon.classList.add("fa-pause");
                ctrlicon.classList.remove("fa-play");
                songImg.src = "milet.jpg";
                songTitle.textContent = "Anytime Anywhere";
              }
            }

            function previous(){
              if(prevbtn.classList.contains("fa-backward")){
                song.src = "haru.mp3";
                song.play();
                ctrlicon.classList.add("fa-pause");
                ctrlicon.classList.remove("fa-play");
                songImg.src = "Haruyorusika.jpg";
                songTitle.textContent = "Haru";
              }
            } 

             </script>

<script>
const outputs = [
  ["neofetch", "OS:Fedora 43", "CPU:i5 11400H ", "GPU:GTX 1650","RAM:24 gigs"],
  ["ls skills/", "HTML","CSS","Python","C(basic)","Linux"], 
  ["ls Hobbies/", "Anime","Coding" ,"Linux"],
  ["Favorite shows", "Neon Genesis Evangelion", "Serial Experimements Lain","Dragon ball","Re:zero","Eighty-Six"]
];

let outputIndex = 0;
const outputEl = document.getElementById('output');
let currentLine = 0;
let charIndex = 0;

function typeNextOutput() {
  outputEl.style.opacity = '0';
  
  setTimeout(() => {
    const lines = outputs[outputIndex];
    outputEl.innerHTML = ''; 
    currentLine = 0;
    charIndex = 0;
    typeNextLine(lines);
    
    outputEl.style.opacity = '1';
  }, 300);
}

function typeNextLine(lines) {
  if (currentLine >= lines.length) {
   
    setTimeout(() => {
      outputIndex = (outputIndex + 1) % outputs.length;
      typeNextOutput();
    }, 2000);
    return;
  }
  
  const lineEl = document.createElement('div');
  lineEl.className = 'line';
  outputEl.appendChild(lineEl);
  
  let i = 0;
  function typeChar() {
    if (i < lines[currentLine].length) {
      lineEl.textContent = lines[currentLine].slice(0, i + 1);
      i++;
      setTimeout(typeChar, 50); 
    } else {
      if (currentLine === lines.length - 1) {
        lineEl.innerHTML += '<span class="cursor">█</span>';
      }
      currentLine++;
      setTimeout(() => typeNextLine(lines), 200);
    }
  }
  typeChar();
}

typeNextOutput(); 

</script>

          <script>
            async function loadRecentTracks() {
  try {
    const response = await fetch(
      "https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=melancholy55838&api_key=ad45b0df4ea54c0597c6c74d60b79119&format=json&limit=10"
    );

    const data = await response.json();
    const tracks = data.recenttracks?.track?.slice(0, 50) || [];

    const groupA = document.getElementById("trackGroupA");
    const groupB = document.getElementById("trackGroupB");

    if (!tracks.length) {
      const empty = "<div class='track-item'>No Activity</div>";
      groupA.innerHTML = empty;
      groupB.innerHTML = empty;
      return;
    }

    const html = tracks.map((track) => {
      const artist = track.artist?.["#text"] || "Unknown Artist";
      const song = track.name || "Unknown Track";
      const imageUrl =
        track.image?.find((img) => img.size === "extralarge")?.["#text"] ||
        track.image?.find((img) => img.size === "large")?.["#text"] ||
        "";

      return `
        <div class="track-item">
          <img src="${imageUrl}" alt="${song} cover">
          <div class="track-text">
            <div class="track-name">${song}</div>
            <div class="track-artist">${artist}</div>
          </div>
        </div>
      `;
    }).join("");

    groupA.innerHTML = html;
    groupB.innerHTML = html;
  } catch (error) {
    console.error("Fetch failed:", error);
  }
}

loadRecentTracks();
